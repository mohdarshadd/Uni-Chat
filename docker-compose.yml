version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: campus-chat-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: campus-chat
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: campus-chat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
